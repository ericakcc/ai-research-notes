site_name: Eric's AI Research Notes
site_description: Paper summaries, experiment reports, and code walkthroughs across ML/AI topics
site_author: Eric Tsou
site_url: https://ericakcc.github.io/ai-research-notes/

repo_name: ericakcc/ai-research-notes
repo_url: https://github.com/ericakcc/ai-research-notes

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ericakcc
      name: GitHub

nav:
  - Home: index.md
  - Vision Transformers:
      - Overview: vision-transformers/index.md
      - "Attention Is All You Need": vision-transformers/attention-paper-notes.md
      - "ViT Paper Notes": vision-transformers/vit-paper-notes.md
      - "Pretrain vs Scratch": vision-transformers/pretrain-vs-scratch.md
  - Computer Vision:
      - Overview: computer-vision/index.md
      - "YOLOv1 Paper Notes": computer-vision/yolov1-paper-notes.md
      - "YOLO Evolution": computer-vision/yolo-evolution.md
  - World Models:
      - Overview: world-models/index.md
      - "VMC Pipeline": world-models/vmc-pipeline.md

markdown_extensions:
  # Admonitions (colored callout boxes)
  - admonition
  - pymdownx.details
  # Code blocks
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # Content tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Math (KaTeX)
  - pymdownx.arithmatex:
      generic: true
  # Emoji / icons
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Other
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.mark
  - pymdownx.keys

plugins:
  - search

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0.16.11/dist/katex.min.js
  - https://unpkg.com/katex@0.16.11/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0.16.11/dist/katex.min.css
